<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body onload="loadProfile()">
<div class="container">
  <div class="profile-pic"></div>
  <h3 id="profileName"></h3>
  <p id="profileNumber"></p>

  <p><strong>Active Learning Requests:</strong> <span id="activeLearningCount">0</span></p>
  <p><strong>Active Tutor Offers:</strong> <span id="activeTutorCount">0</span></p>

  <div id="learnSection" style="margin-top: 1rem;">
    <h4 style="margin-bottom: 0.5rem;">Courses I Want to Learn</h4>
    <ul id="learnRequestsList" style="list-style: decimal inside;">
      </ul>
  </div>

  <div id="tutorSection" style="margin-top: 1rem;">
    <h4 style="margin-bottom: 0.5rem;">Courses I Can Tutor</h4>
    <ul id="tutorOffersList" style="list-style: decimal inside;">
      </ul>
  </div>

  <button onclick="window.location.href='menu.html'">Back</button>
</div>
<script src="script.js"></script>
</body>
</html>
